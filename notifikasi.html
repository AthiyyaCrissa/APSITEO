<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Athenaeum Library | Notifikasi</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { min-height: max(884px, 100dvh); }
</style>
<script>
  tailwind.config = {
    darkMode:"class",
    theme:{extend:{colors:{"on-secondary-container":"#006f64","secondary-container":"#6df5e1","primary":"#00236f","surface-container-lowest":"#ffffff","on-background":"#191c1e","surface":"#f7f9fb","surface-container-highest":"#e0e3e5","on-surface":"#191c1e","error":"#ba1a1a","background":"#f7f9fb","surface-container-high":"#e6e8ea","on-primary-container":"#90a8ff","secondary":"#006b5f","on-primary":"#ffffff","outline":"#757682","on-error-container":"#93000a","surface-container":"#eceef0","on-surface-variant":"#444651","on-error":"#ffffff","primary-container":"#1e3a8a","error-container":"#ffdad6","primary-fixed":"#dce1ff","outline-variant":"#c5c5d3","surface-container-low":"#f2f4f6"},
    spacing:{xs:"4px","container-max":"1280px",gutter:"24px",lg:"24px",base:"4px",sm:"8px",xl:"40px",md:"16px"},
    fontFamily:{"body-sm":["Inter"],"headline-md":["Plus Jakarta Sans"],"label-sm":["Inter"],"body-md":["Inter"],"label-md":["Inter"],"headline-lg":["Plus Jakarta Sans"]},
    fontSize:{"body-sm":["14px",{lineHeight:"20px",fontWeight:"400"}],"headline-md":["24px",{lineHeight:"32px",fontWeight:"600"}],"label-sm":["12px",{lineHeight:"16px",fontWeight:"600"}],"body-md":["16px",{lineHeight:"24px",fontWeight:"400"}],"label-md":["14px",{lineHeight:"20px",letterSpacing:"0.01em",fontWeight:"500"}],"headline-lg":["32px",{lineHeight:"40px",letterSpacing:"-0.01em",fontWeight:"600"}]}}}
  }
</script>
</head>
<body class="bg-surface text-on-surface font-body-md">
<script>window.ATHENAEUM_ALLOWED_ROLES = ['member'];</script>
<script src="auth-guard.js"></script>

<header class="bg-surface shadow-sm fixed top-0 w-full z-30">
  <div class="flex justify-between items-center w-full px-lg max-w-container-max mx-auto h-16">
    <div class="flex items-center gap-md">
      <a href="katalog.html" class="material-symbols-outlined text-primary hover:bg-surface-container p-1 rounded-lg transition-colors">arrow_back</a>
      <h1 class="font-headline-md text-headline-md font-bold text-primary">Notifikasi</h1>
    </div>
    <nav class="hidden md:flex gap-xl">
      <a class="text-on-surface-variant hover:text-primary transition-colors" href="katalog.html">Dashboard</a>
      <a class="text-on-surface-variant hover:text-primary transition-colors" href="katalog.html">Catalog</a>
      <a class="text-on-surface-variant hover:text-primary transition-colors" href="profil.html">Profile</a>
    </nav>
    <a href="#" onclick="logoutUser(); return false;" class="material-symbols-outlined text-on-surface-variant hover:text-error transition-colors">logout</a>
  </div>
</header>

<main class="pt-24 pb-20 px-4 md:px-lg max-w-container-max mx-auto max-w-2xl">

  <div class="flex justify-between items-center mb-md">
    <h2 class="font-headline-md text-headline-md text-on-surface">Semua Notifikasi</h2>
    <button onclick="markAllRead()" class="text-primary font-label-md hover:underline flex items-center gap-xs">
      <span class="material-symbols-outlined text-[16px]">done_all</span> Tandai semua dibaca
    </button>
  </div>

  <div id="notif-list" class="space-y-sm">
    <div class="text-center py-xl text-on-surface-variant">
      <span class="material-symbols-outlined text-[40px] animate-spin">sync</span>
      <p class="mt-md font-body-md">Memuat notifikasi...</p>
    </div>
  </div>

</main>

<nav class="md:hidden fixed bottom-0 left-0 w-full z-30 flex justify-around items-center py-2 bg-surface border-t border-outline-variant">
  <a class="flex flex-col items-center text-on-surface-variant" href="katalog.html">
    <span class="material-symbols-outlined">dashboard</span><span class="font-label-sm text-[10px]">Dashboard</span>
  </a>
  <a class="flex flex-col items-center text-on-surface-variant" href="katalog.html">
    <span class="material-symbols-outlined">auto_stories</span><span class="font-label-sm text-[10px]">Catalog</span>
  </a>
  <a class="flex flex-col items-center text-on-surface-variant" href="profil.html">
    <span class="material-symbols-outlined">person</span><span class="font-label-sm text-[10px]">Profile</span>
  </a>
</nav>

<script>
  // ===== KONFIGURASI API =====
  // Sesuaikan endpoint notifikasi dengan backend kamu:
  // - GET  /notifications          -> daftar notifikasi milik user yang login
  // - POST /notifications/read-all -> tandai semua sebagai sudah dibaca
  // - POST /notifications/:id/read -> tandai satu notifikasi sebagai sudah dibaca
  const API_BASE_URL = 'https://apsiteo-production.up.railway.app/api';
  const token = localStorage.getItem('athenaeum_token');

  let notifData = [];

  function formatWaktu(iso) {
    if (!iso) return '-';
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    const diffMs = Date.now() - d.getTime();
    const diffH = Math.floor(diffMs / (1000*60*60));
    if (diffH < 1) return 'Baru saja';
    if (diffH < 24) return `${diffH} jam lalu`;
    const diffD = Math.floor(diffH / 24);
    if (diffD < 7) return `${diffD} hari lalu`;
    return d.toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' });
  }

  // Ikon default berdasarkan tipe notifikasi, dipakai kalau backend tidak
  // mengirim field icon/iconColor secara eksplisit.
  const iconByType = {
    overdue: { icon:'report', color:'text-error' },
    due_soon: { icon:'event_repeat', color:'text-secondary' },
    book_available: { icon:'bookmark_added', color:'text-primary' },
    fine: { icon:'payments', color:'text-error' },
    loan_confirmed: { icon:'verified', color:'text-secondary' },
    membership: { icon:'local_library', color:'text-primary' },
    default: { icon:'notifications', color:'text-on-surface-variant' },
  };
  const linkByType = {
    overdue: 'riwayat.html',
    due_soon: 'riwayat.html',
    book_available: 'catalog.html',
    fine: 'denda.html',
    loan_confirmed: 'riwayat.html',
    membership: 'profil.html',
  };

  function normalizeNotif(item) {
    const meta = iconByType[item.type] || iconByType.default;
    return {
      id: item.id || item._id,
      icon: item.icon || meta.icon,
      iconColor: item.iconColor || meta.color,
      title: item.title,
      desc: item.message || item.desc || '',
      waktu: formatWaktu(item.createdAt || item.time),
      unread: item.read === false || item.unread === true,
      link: item.link || linkByType[item.type] || '#',
    };
  }

  async function fetchNotif() {
    const list = document.getElementById('notif-list');
    if (!token) {
      list.innerHTML = `<div class="text-center py-xl text-on-surface-variant"><p>Silakan login untuk melihat notifikasi kamu.</p></div>`;
      return;
    }
    try {
      const res = await fetch(`${API_BASE_URL}/notifications`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) throw new Error('Gagal memuat notifikasi');
      const data = await res.json();
      notifData = data.map(normalizeNotif);
      renderNotif(notifData);
    } catch (err) {
      console.error(err);
      list.innerHTML = `<div class="text-center py-xl text-error"><span class="material-symbols-outlined text-[48px]">cloud_off</span><p class="mt-md">Gagal memuat notifikasi. Pastikan backend jalan di ${API_BASE_URL}</p></div>`;
    }
  }

  function renderNotif(data) {
    const list = document.getElementById('notif-list');
    list.innerHTML = '';
    if (!data.length) {
      list.innerHTML = `<div class="text-center py-xl text-on-surface-variant"><span class="material-symbols-outlined text-[48px] text-outline">notifications_off</span><p class="mt-md">Belum ada notifikasi.</p></div>`;
      return;
    }
    data.forEach(n => {
      list.insertAdjacentHTML('beforeend', `
        <a href="${n.link}" onclick="markOneRead('${n.id}')" class="flex items-start gap-md p-md rounded-xl border ${n.unread ? 'bg-primary-fixed/20 border-primary/20' : 'bg-surface-container-lowest border-outline-variant'} hover:shadow-md transition-all block">
          <div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center flex-shrink-0 mt-0.5">
            <span class="material-symbols-outlined ${n.iconColor}">${n.icon}</span>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex justify-between items-start gap-sm">
              <p class="font-body-md font-bold text-on-surface ${n.unread ? '' : 'font-normal'}">${n.title}</p>
              ${n.unread ? '<span class="w-2 h-2 rounded-full bg-primary flex-shrink-0 mt-2"></span>' : ''}
            </div>
            <p class="font-body-sm text-on-surface-variant mt-xs">${n.desc}</p>
            <p class="font-label-sm text-outline mt-xs">${n.waktu}</p>
          </div>
        </a>
      `);
    });
  }

  async function markAllRead() {
    if (!token) return;
    notifData.forEach(n => n.unread = false);
    renderNotif(notifData);
    showToast('Semua notifikasi ditandai dibaca');
    try {
      await fetch(`${API_BASE_URL}/notifications/read-all`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      });
    } catch (err) {
      console.error('Gagal menandai semua notifikasi sebagai dibaca:', err);
    }
  }

  async function markOneRead(id) {
    const n = notifData.find(x => x.id === id);
    if (n) n.unread = false;
    try {
      await fetch(`${API_BASE_URL}/notifications/${id}/read`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      });
    } catch (err) {
      console.error('Gagal menandai notifikasi sebagai dibaca:', err);
    }
  }

  function logoutUser() {
    localStorage.removeItem('athenaeum_current_user');
    localStorage.removeItem('athenaeum_token');
    window.location.href = 'index.html';
  }

  function showToast(msg) {
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#191c1e;color:#eff1f3;padding:10px 20px;border-radius:999px;z-index:99;font-size:14px;';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  fetchNotif();
</script>
</body>
</html>
